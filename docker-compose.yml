version: '3.9'

services:
  nginx:
    build: ./nginx
    ports:
      - "8081:8080"
    volumes:
      - ./app/src:/var/www/html
    depends_on:
      - app
    security_opt:
      - no-new-privileges:true

  app:
    build: ./app
    volumes:
      - ./app/src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=appuser
      - DB_PASS=${DB_PASSWORD}
      - DB_NAME=appdb
    security_opt:
      - no-new-privileges:true

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    security_opt:
      - no-new-privileges:true

  redis:
    image: redis:alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true

volumes:
  db_data: