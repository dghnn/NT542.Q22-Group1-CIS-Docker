version: '3.9'

services:
  nginx:
    build: ./nginx
    ports:
      - "8080:80"
    volumes:
      - ./app/src:/var/www/html
    depends_on:
      - app

  app:
    build: ./app
    volumes:
      - ./app/src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=${DB_PASSWORD}

  db:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:alpine

volumes:
  db_data:
