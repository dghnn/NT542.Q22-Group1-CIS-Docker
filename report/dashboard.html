<!DOCTYPE html>
<html>
<head>
  <title>CIS Docker Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body { font-family: Arial; margin: 20px; }
    .card { padding: 15px; margin: 10px; border-radius: 10px; display: inline-block; width: 150px; color: white; }
    .pass { background: green; }
    .fail { background: red; }
    .warn { background: orange; }
  </style>
</head>

<body>

<h1>🐳 CIS Docker Security Dashboard</h1>

<div id="summary"></div>

<canvas id="chart" width="400" height="200"></canvas>

<script>
fetch("cis_report.csv")
  .then(res => res.text())
  .then(data => {
    let lines = data.trim().split("\n").slice(1);

    let pass = 0, fail = 0, warn = 0;

    lines.forEach(l => {
      let cols = l.split(",");
      let status = cols[1];

      if (status === "PASS") pass++;
      else if (status === "FAIL") fail++;
      else if (status === "WARN") warn++;
    });

    document.getElementById("summary").innerHTML = `
      <div class="card pass">PASS<br>${pass}</div>
      <div class="card fail">FAIL<br>${fail}</div>
      <div class="card warn">WARN<br>${warn}</div>
    `;

    new Chart(document.getElementById("chart"), {
      type: 'pie',
      data: {
        labels: ["PASS", "FAIL", "WARN"],
        datasets: [{
          data: [pass, fail, warn],
          backgroundColor: ["green", "red", "orange"]
        }]
      }
    });

  });
</script>

</body>
</html>
